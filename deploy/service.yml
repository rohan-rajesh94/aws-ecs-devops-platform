apiVersion: v1
kind: Service
metadata:
  name: taskapi-service
  namespace: taskapi
  labels:
    app: taskapi
spec:
  selector:
    app: taskapi        # routes to pods with this label
  ports:
    - protocol: TCP
      port: 80          # service port
      targetPort: 5000  # container port
  type: ClusterIP       # internal only — ingress handles external