version: "3.9"

services:

  app:
    build: ./app
    container_name: taskapi
    ports:
      - "5000:5000"
    environment:
      - DB_PATH=/data/tasks.db
      - FLASK_ENV=development
    volumes:
      - taskdata:/data
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: taskapi-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass123
      MYSQL_DATABASE: taskapi
      MYSQL_USER: admin
      MYSQL_PASSWORD: adminpass123
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
    restart: unless-stopped

volumes:
  taskdata:
  mysqldata: