---
# Server hardening

- name: Install UFW firewall
  apt:
    name: ufw
    state: present

- name: Set UFW default deny incoming
  ufw:
    default: deny
    direction: incoming

- name: Set UFW default allow outgoing
  ufw:
    default: allow
    direction: outgoing

- name: Allow SSH
  ufw:
    rule: allow
    port: '22'
    proto: tcp

- name: Allow HTTP
  ufw:
    rule: allow
    port: '80'
    proto: tcp

- name: Allow HTTPS
  ufw:
    rule: allow
    port: '443'
    proto: tcp

- name: Allow Flask app port
  ufw:
    rule: allow
    port: '5000'
    proto: tcp

- name: Enable UFW
  ufw:
    state: enabled

- name: Disable root SSH login
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PermitRootLogin'
    line: 'PermitRootLogin no'
    state: present

- name: Disable password authentication
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PasswordAuthentication'
    line: 'PasswordAuthentication no'
    state: present

- name: Restart SSH service
  service:
    name: sshd
    state: restarted

- name: Install fail2ban
  apt:
    name: fail2ban
    state: present

- name: Start fail2ban
  service:
    name: fail2ban
    state: started
    enabled: yes